[pytest]
pythonpath = .
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --html=reports/report.html
    --self-contained-html
    -ra
    --strict-markers
    --screenshot only-on-failure

markers =
    smoke: smoke tests
    regression: regression tests
    slow: slow tests

